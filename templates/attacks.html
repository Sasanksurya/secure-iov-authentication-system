<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attack Simulation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #b52a37;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 5px solid #007bff;
        }

        .result p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>IoV Attack Simulation</h1>

    <form method="POST" action="/simulate-attack">

        <label>Vehicle ID</label>
        <input type="text" name="vehicle_id" required>

        <label>Select Attack Type</label>
        <select name="attack_type" required>
            <option value="sybil">Sybil Attack</option>
            <option value="replay">Replay Attack</option>
            <option value="fake">Fake Vehicle Attack</option>
            <option value="dos">DoS Attack</option>
        </select>

        <button type="submit">Simulate Attack</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Attack Result</h3>

        {% for key, value in result.items() %}
            <p><strong>{{ key }}:</strong> {{ value }}</p>
        {% endfor %}
    </div>
    {% endif %}

</div>

</body>
</html>
