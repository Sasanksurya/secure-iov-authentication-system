<!DOCTYPE html>
<html>
<head>
    <title>Security Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .cards {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 30px;
            width: 250px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .number {
            font-size: 42px;
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>

    <h1>IoV Security Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h2>Total Authentications</h2>
            <div class="number">{{ total_auth }}</div>
        </div>

        <div class="card">
            <h2>Total Attacks</h2>
            <div class="number">{{ total_attacks }}</div>
        </div>

        <div class="card">
            <h2>Detected Attacks</h2>
            <div class="number">{{ detected_attacks }}</div>
        </div>
    </div>

</body>
</html>
